# Render Blueprint (optional). Lets you create the backend service from the
# repo instead of clicking through the dashboard. Render injects $PORT and a
# public https URL automatically.
services:
  - type: web
    name: crypto-leads-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: starter            # 'free' works for small Top-N but may OOM on large runs (Chromium is memory-heavy)
    healthCheckPath: /
    autoDeploy: true
